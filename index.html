<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BUG WHATSAPP MZBLZX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.container{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
padding:60px;
border-radius:25px;
text-align:center;
width:500px;
box-shadow:0 0 60px rgba(0,255,150,0.3);
}

h2{
margin-bottom:25px;
font-weight:500;
letter-spacing:3px;
font-size:28px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
outline:none;
font-size:16px;
background:rgba(255,255,255,0.1);
color:white;
margin-top:10px;
}

input::placeholder{
color:#ccc;
}

input:focus{
box-shadow:0 0 15px #00ff88;
}

.info{
margin-top:20px;
font-size:13px;
color:#ccc;
}

</style>
</head>

<body>

<video id="bg-video" autoplay muted loop playsinline>
<source src="background.mp4" type="video/mp4">
</video>

<div class="container">

<h2>BUG WHATSAPP MZBLZX</h2>

<input type="text" id="nomor" placeholder="Masukkan nomor 628xxxx">

<p class="info">Tekan ENTER untuk mengirim</p>

</div>

<script>

/* VIDEO AUTOPLAY FIX */

const video = document.getElementById("bg-video");

video.play().catch(() => {
document.addEventListener("click", () => {
video.play();
});
});

/* WA SENDER + LOAD TEXT.TXT */

document.getElementById("nomor").addEventListener("keyup", async function(e){

if(e.key === "Enter"){

let nomor = this.value;

/* ambil isi text.txt */

let response = await fetch("text.txt");
let pesan = await response.text();

/* kirim ke WhatsApp */

let link = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

window.location.href = link;

}

});

</script>

</body>
</html>
